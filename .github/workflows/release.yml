name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  android-release:
    name: Build and publish Android release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build release APK
        run: ./gradlew test :app:assembleRelease

      - name: Prepare release asset
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release/latebris-${VERSION}-unsigned.apk"
          cat > release/release-notes.md <<EOF
          Latebris ${VERSION}

          Android APK built from the main branch.

          Included:
          - Preset-based location profile management
          - GPS, Wi-Fi, and cell-signal test flows
          - LSPosed scoped module support
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ASSET="release/latebris-${VERSION}-unsigned.apk"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Latebris ${VERSION}" \
              --notes-file release/release-notes.md \
              --target "$GITHUB_SHA"
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "Latebris ${VERSION}" \
              --notes-file release/release-notes.md \
              --target "$GITHUB_SHA"
          fi
