name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.1

permissions:
  contents: write

jobs:
  android-release:
    name: Build and publish Android release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION_NAME="$(grep -E 'versionName = ' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')"
          test "$TAG" = "v$VERSION_NAME"

      - name: Restore signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          : "${ANDROID_SIGNING_KEYSTORE_BASE64:?Missing ANDROID_SIGNING_KEYSTORE_BASE64 secret}"
          echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/latebris-release.keystore"

      - name: Test and build signed release APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/latebris-release.keystore
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          : "${ANDROID_SIGNING_STORE_PASSWORD:?Missing ANDROID_SIGNING_STORE_PASSWORD secret}"
          : "${ANDROID_SIGNING_KEY_ALIAS:?Missing ANDROID_SIGNING_KEY_ALIAS secret}"
          : "${ANDROID_SIGNING_KEY_PASSWORD:?Missing ANDROID_SIGNING_KEY_PASSWORD secret}"
          ./gradlew test :app:assembleRelease

      - name: Verify release APK signature
        run: |
          set -euo pipefail
          test -f app/build/outputs/apk/release/app-release.apk
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare release asset
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/latebris-${VERSION}.apk"
          cat > release/release-notes.md <<EOF
          Latebris ${VERSION}

          Signed Android APK built from the main branch.

          Included:
          - Preset-based location profile management
          - GPS, Wi-Fi, and cell-signal test flows
          - LSPosed scoped module support
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ASSET="release/latebris-${VERSION}.apk"

          git tag --force "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Latebris ${VERSION}" \
              --notes-file release/release-notes.md \
              --target "$GITHUB_SHA"
            gh release delete-asset "$TAG" "latebris-${VERSION}-unsigned.apk" --yes || true
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "Latebris ${VERSION}" \
              --notes-file release/release-notes.md \
              --target "$GITHUB_SHA"
          fi
